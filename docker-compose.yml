services:
  db:
    image: timescale/timescaledb:latest-pg17
    container_name: oei-db
    environment:
      POSTGRES_DB: oei
      POSTGRES_USER: oei
      POSTGRES_PASSWORD: oei
    ports:
      - "5433:5432"
    volumes:
      - oei-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oei -d oei"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  oei-pgdata:
