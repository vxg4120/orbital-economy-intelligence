# Canonical operator MSO tree (the taxonomy) — hand-curated seed.
#
# Schema:
#   operators:
#     - name:         canonical operator name (UNIQUE; becomes operator.canonical_name)
#       country:      ISO-ish country of the operating entity
#       class:        commercial | civil | defense | academic | mixed  (operator.operator_class)
#       aliases:      free-text names seen in catalogs / press (source tag 'seed')
#       satcat_codes: CelesTrak SATCAT owner/source codes  (source tag 'satcat')
#                     from https://celestrak.org/satcat/sources.php
#       gcat_codes:   GCAT owner strings seen in satcat.tsv  (source tag 'gcat')
#   relationships:
#     - child:        canonical name that was acquired/merged
#       parent:       canonical name of the surviving entity
#       relationship: acquired_by | merged_into | subsidiary_of | brand_of
#       valid_from:   effective date (deal close) — SCD2 split date
#
# M&A close dates verified against public record (July 2026):
#   OneWeb -> Eutelsat (Eutelsat Group): all-share combination closed 2023-09-28.
#   Inmarsat -> Viasat: acquisition completed 2023-05-30.
#   Intelsat -> SES: global acquisition closed 2025-07-17.
# Note: most modern LEO constellations have no distinct SATCAT owner code (SATCAT owner is
# country-coarse, e.g. Starlink -> 'US'); those operators carry gcat_codes only. That coarseness
# is exactly the "SATCAT owner goes stale / is too coarse" problem the graph exists to fix.

operators:
  - name: SpaceX
    country: US
    class: commercial
    aliases: [Starlink, Space Exploration Technologies, SpaceX Starlink]
    satcat_codes: []
    gcat_codes: [SpaceX]

